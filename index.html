<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marcos Jabalquinto | IT Operations & Support</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #f1f5f9;
            --accent-color: #38bdf8;
            --card-bg: ##000000;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            text-align: center;
        }

        .profile-img {
            width: 100%;
            height: auto;
            margin-bottom: 20px;
            object-fit: cover;
        }

        .profile-menu {
            width: 35%;
            height: auto;
            margin-bottom: 20px;
            object-fit: cover;
        }

        h1 {
            margin: 10px 0;
            font-size: 2.5rem;
            letter-spacing: -1px;
        }

        .subtitle {
            color: var(--accent-color);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .links-grid {
            display: grid;
            gap: 15px;
            width: 70%;
        }

        .btn {
            background-color: var(--card-bg);
            color: white;
            padding: 18px;
            text-decoration: none;
            border-radius: 12px;
            border: 1px solid #334155;
            transition: all 0.3s ease;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn:hover {
            border-color: var(--accent-color);
            transform: translateY(-3px);
            background-color: #334155;
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: var(--bg-color);
            border: none;
        }

        .btn-primary:hover {
            background-color: #7dd3fc;
            color: var(--bg-color);
        }

        .footer {
            margin-top: 50px;
            font-size: 0.8rem;
            color: #64748b;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="links-grid">
        
            <img src="Avatar.png" alt="Marcos Jabalquinto" class="profile-img">
        
            <a href="CV_Marcos_Jabalquinto.pdf" class="btn btn-primary" target="_blank">
                📄 Ver Currículum Vitae (PDF)
            </a>

            <a href="https://www.veronikapeluqueria.es" class="btn" target="_blank">
                💇‍♀️ Web Peluquería en producción
            </a>

            <a href="https://mbjabalquinto.github.io/cartas/" class="btn" target="_blank">
                🃏 Juego de Cartas
            </a>

            <a href="https://mbjabalquinto.github.io/memoria/" class="btn" target="_blank">
                🧠 Juego de Memoria
            </a>
            
            <a href="https://www.linkedin.com/in/marcos-jabalquinto-ibañez-9b344a35" class="btn" style="border-color: #0077b5;" target="_blank">
                🔗 LinkedIn
            </a>

            <a href="https://github.com/mbjabalquinto" class="btn" style="border-color: #0077b5;" target="_blank">
                <img src="github.png" alt="github" class="profile-menu">
            </a>
            
            <div class="footer">
            © 2026 Marcos Jabalquinto Ibañez - Málaga, España
            </div>
        </div>
    </div>

</body>
</html>
